name: BJMF Cloud Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC and scheduled events can be delayed or dropped.
    # Use off-peak minute offsets and redundant 10-minute starts across
    # 07:33-17:53 China time to cover short sign-in windows more reliably.
    # Concurrency keeps at most one watcher active.
    - cron: "33,43,53 23 * * *"
    - cron: "3,13,23,33,43,53 0-9 * * *"

concurrency:
  group: bjmf-cloud-check
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BJMF_WATCH_MINUTES: "350"
          BJMF_WATCH_INTERVAL_SECONDS: "60"
          BJMF_WATCH_UNTIL_WINDOW_END: "true"
          BJMF_AUTOSUBMIT: "true"
        run: python cloud_check.py
