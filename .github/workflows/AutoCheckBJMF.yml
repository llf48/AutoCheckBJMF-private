name: BJMF Cloud Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      watch_minutes:
        description: "How many minutes this run should watch for punch tasks"
        required: false
        default: "4"
      watch_interval_seconds:
        description: "Seconds between checks while watching"
        required: false
        default: "60"
  schedule:
    # GitHub cron uses UTC and scheduled events can be delayed or dropped.
    # Use off-peak minute offsets and redundant 5-minute starts across
    # 07:33-17:58 China time to cover short sign-in windows more reliably.
    # Concurrency keeps at most one watcher active.
    - cron: "33,38,43,48,53,58 23 * * *"
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 0-9 * * *"

concurrency:
  group: bjmf-cloud-check
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BJMF_WATCH_MINUTES: ${{ github.event.inputs.watch_minutes || '4' }}
          BJMF_WATCH_INTERVAL_SECONDS: ${{ github.event.inputs.watch_interval_seconds || '60' }}
          BJMF_WATCH_UNTIL_WINDOW_END: "true"
          BJMF_AUTOSUBMIT: "true"
        run: python cloud_check.py
