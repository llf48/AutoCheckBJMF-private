name: BJMF Cloud Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      watch_minutes:
        description: "How many minutes this run should watch for punch tasks"
        required: false
        default: "5"
      watch_interval_seconds:
        description: "Seconds between checks while watching"
        required: false
        default: "30"
      force_check:
        description: "Run one check even when scheduled checks are paused"
        required: false
        default: "false"
      notice_text:
        description: "Optional BJMF/WeChat notice text with an end time"
        required: false
        default: ""
      direct_punch_url:
        description: "Optional direct punch page URL/path from the BJMF notice"
        required: false
        default: ""
  schedule:
    # GitHub cron uses UTC. China classes are 08:00-12:00 and 14:30-17:40.
    # Each class is about 40 minutes with a 5-minute break, so checks run at
    # class start +2/+12/+22/+32 minutes, plus pre-class and end-window checkpoints.
    # Keep BJMF_SAFE_SINGLE_CHECK=true; do not restore all-day high-frequency polling.
    - cron: "57 23 * * *"
    - cron: "2,12,22,32,47,57 0 * * *"
    - cron: "7,17,32,42,52 1 * * *"
    - cron: "2,17,27,37,47 2 * * *"
    - cron: "2,12,22,32,47,57 3 * * *"
    - cron: "27,32,42,52 6 * * *"
    - cron: "2,17,27,37,47 7 * * *"
    - cron: "2,12,22,32,47,57 8 * * *"
    - cron: "7,17,32,37 9 * * *"

concurrency:
  group: bjmf-cloud-check
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BJMF_WATCH_MINUTES: ${{ github.event.inputs.watch_minutes || '5' }}
          BJMF_WATCH_INTERVAL_SECONDS: ${{ github.event.inputs.watch_interval_seconds || '30' }}
          BJMF_WATCH_UNTIL_WINDOW_END: "false"
          BJMF_AUTOSUBMIT: "true"
          BJMF_PAUSED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_check != 'true' && github.event.inputs.notice_text == '' && github.event.inputs.direct_punch_url == '' }}
          BJMF_SAFE_SINGLE_CHECK: "true"
          BJMF_FORCE_CHECK: ${{ github.event.inputs.force_check || 'false' }}
          BJMF_CLASS_WINDOW_GATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_check != 'true' && github.event.inputs.notice_text == '' && github.event.inputs.direct_punch_url == '' }}
          BJMF_NOTICE_TEXT: ${{ github.event.inputs.notice_text || '' }}
          BJMF_DIRECT_PUNCH_URL: ${{ github.event.inputs.direct_punch_url || '' }}
        run: python cloud_check.py
