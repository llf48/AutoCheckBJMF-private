name: BJMF Cloud Check

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These ranges cover 07:50-18:00 China time.
    - cron: "50,55 23 * * *"
    - cron: "*/5 0-9 * * *"
    - cron: "0 10 * * *"

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python cloud_check.py
