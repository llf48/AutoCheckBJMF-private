name: BJMF Cloud Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Start a 40-minute watcher every 30 minutes.
    # These ranges cover 07:50-18:00 China time with overlap.
    - cron: "50 23 * * *"
    - cron: "20,50 0-9 * * *"

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BJMF_WATCH_MINUTES: "40"
          BJMF_WATCH_INTERVAL_SECONDS: "300"
          BJMF_AUTOSUBMIT: "true"
        run: python cloud_check.py
