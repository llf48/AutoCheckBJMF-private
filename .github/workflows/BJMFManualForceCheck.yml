name: BJMF Manual Force Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      notice_text:
        description: "Optional BJMF/WeChat notice text with an end time"
        required: false
        default: ""
      direct_punch_url:
        description: "Optional direct punch page URL/path from the BJMF notice"
        required: false
        default: ""

concurrency:
  group: bjmf-manual-force-check
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run forced BJMF check
        env:
          BJMF_CLASS_ID: "96755"
          BJMF_LAT: "23.185647"
          BJMF_LNG: "113.33389"
          BJMF_ACC: "30"
          BJMF_COOKIE: ${{ secrets.BJMF_COOKIE }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          BJMF_WATCH_MINUTES: "5"
          BJMF_WATCH_INTERVAL_SECONDS: "30"
          BJMF_WATCH_UNTIL_WINDOW_END: "false"
          BJMF_AUTOSUBMIT: "true"
          BJMF_PAUSED: "false"
          BJMF_SAFE_SINGLE_CHECK: "true"
          BJMF_FORCE_CHECK: "true"
          BJMF_CLASS_WINDOW_GATE: "false"
          BJMF_NOTICE_TEXT: ${{ github.event.inputs.notice_text || '' }}
          BJMF_DIRECT_PUNCH_URL: ${{ github.event.inputs.direct_punch_url || '' }}
        run: python cloud_check.py
